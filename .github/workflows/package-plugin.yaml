name: Package IDA Plugin 📦

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Keystone release tag to download (e.g., v1)'
        required: false
        default: 'v1'

jobs:
  package:
    if: github.actor == 'Jebaitedneko'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v1' }}

    steps:
    - uses: actions/checkout@v4

    - name: Download and Extract Release Assets
      run: |
        for platform in windows-latest ubuntu-latest macos-latest; do
          echo "⬇️ Downloading artifact_${platform}.zip for tag ${{ env.RELEASE_TAG }}..."
          curl -sL -o "artifact_${platform}.zip" "https://github.com/Jebaitedneko/keystone/releases/download/${{ env.RELEASE_TAG }}/artifact_${platform}.zip"

          echo "📦 Extracting to artifact_${platform}/..."
          mkdir -p "artifact_${platform}"
          unzip -q -o "artifact_${platform}.zip" -d "artifact_${platform}/"

          echo "🧹 Cleaning up zip file..."
          rm "artifact_${platform}.zip"
        done

    - name: Package distributions
      shell: bash
      run: |
        mkdir -p dist

        PLATFORMS=(
          "win32:windows-latest:keystone_win32"
          "linux:ubuntu-latest:keystone_linux"
          "darwin:macos-latest:keystone_darwin"
        )

        for mapping in "${PLATFORMS[@]}"; do
          IFS=':' read -r dist_folder artifact_folder keystone_subfolder <<< "$mapping"

          echo "🛠️ Packaging $dist_folder..."
          mkdir -p "dist/$dist_folder/patching/keystone"

          cp -r plugins/* "dist/$dist_folder/"

          cp -r "artifact_${artifact_folder}/${keystone_subfolder}/"* "dist/$dist_folder/patching/keystone/"

          (cd "dist/$dist_folder" && zip -rq "../patching_${dist_folder}.zip" ./*)
        done

    - uses: actions/upload-artifact@v4
      with:
         path: ${{ github.workspace }}/dist/*.zip